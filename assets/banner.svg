<svg width="1000" height="200" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#080015"/>
      <stop offset="40%"  stop-color="#1C0645"/>
      <stop offset="60%"  stop-color="#1C0645"/>
      <stop offset="100%" stop-color="#080015"/>
    </linearGradient>
    <radialGradient id="dome" cx="50%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="70%"  stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="tg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" fill="url(#bg)"/>

  <!-- Border lines -->
  <line x1="0" y1="0"   x2="1000" y2="0"   stroke="#5B21B6" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="199" x2="1000" y2="199" stroke="#5B21B6" stroke-width="1" opacity="0.5"/>

  <!-- Ambient center glow -->
  <ellipse cx="500" cy="95" rx="330" ry="140" fill="url(#glow)"/>

  <!-- Dome layers -->
  <ellipse cx="500" cy="2"  rx="160" ry="130" fill="#3B0764"/>
  <ellipse cx="500" cy="2"  rx="135" ry="108" fill="#5B21B6"/>
  <ellipse cx="500" cy="2"  rx="108" ry="86"  fill="url(#dome)"/>

  <!-- Avatar ring -->
  <circle cx="500" cy="42" r="34" fill="#12003A" stroke="#C4B5FD" stroke-width="1.8"/>

  <!-- GitHub Mark (scaled 1.75x from 24x24, centered at 500,42) -->
  <g transform="translate(479,21) scale(1.75)" fill="#EDE9FE">
    <path d="M12 0.297C5.373 0.297 0 5.67 0 12.297c0 5.303 3.438 9.8 8.205 11.385
      c.6.113.82-.258.82-.577c0-.285-.01-1.04-.015-2.04
      c-3.338.724-4.042-1.61-4.042-1.61
      C4.422 18.378 3.633 18.01 3.633 18.01
      c-1.087-.744.084-.729.084-.729
      c1.205.084 1.838 1.236 1.838 1.236
      c1.07 1.835 2.809 1.305 3.495.998
      c.108-.776.417-1.305.76-1.605
      c-2.665-.3-5.466-1.332-5.466-5.93
      c0-1.31.465-2.38 1.235-3.22
      c-.135-.303-.54-1.523.105-3.176
      c0 0 1.005-.322 3.3 1.23
      c.96-.267 1.98-.399 3-.405
      c1.02.006 2.04.138 3 .405
      c2.28-1.552 3.285-1.23 3.285-1.23
      c.645 1.653.24 2.873.12 3.176
      c.765.84 1.23 1.91 1.23 3.22
      c0 4.61-2.805 5.625-5.475 5.92
      c.42.36.81 1.096.81 2.22
      c0 1.606-.015 2.896-.015 3.286
      c0 .315.21.69.825.57
      C20.565 22.092 24 17.592 24 12.297
      C24 5.67 18.627 0.297 12 0.297z"/>
  </g>

  <!-- Horizontal rules beside info -->
  <line x1="28"  y1="90" x2="235" y2="90" stroke="#6D28D9" stroke-width="0.8" opacity="0.7"/>
  <line x1="765" y1="90" x2="972" y2="90" stroke="#6D28D9" stroke-width="0.8" opacity="0.7"/>

  <!-- LEFT: GitHub icon + link -->
  <circle cx="46" cy="103" r="9" fill="none" stroke="#A78BFA" stroke-width="1.3"/>
  <circle cx="46" cy="99"  r="3.5" fill="#A78BFA"/>
  <path d="M38 113 Q38 107 46 107 Q54 107 54 113" fill="#A78BFA"/>
  <text x="62" y="107" font-family="Courier New, monospace" font-size="10.5"
        fill="#C4B5FD" letter-spacing="0.4">github.com/shanmuka-p</text>

  <!-- RIGHT: Email icon + address -->
  <rect x="930" y="96" width="16" height="11" rx="1.5" fill="none" stroke="#A78BFA" stroke-width="1.3"/>
  <polyline points="930,96 938,103 946,96" fill="none" stroke="#A78BFA" stroke-width="1"/>
  <text x="926" y="107" text-anchor="end" font-family="Courier New, monospace" font-size="10.5"
        fill="#C4B5FD" letter-spacing="0.4">shanmukareddypadala@gmail.com</text>

  <!-- Name -->
  <text x="500" y="148" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="28" font-weight="900" fill="#FFFFFF"
        letter-spacing="5" filter="url(#tg)">PADALA SHANMUKA REDDY</text>

  <!-- Subtitle -->
  <text x="500" y="172" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="11.5" fill="#C4B5FD" letter-spacing="3.5">MOBILE &amp; FULL STACK DEVELOPER</text>

  <!-- Bottom-left decorative strips //// -->
  <g transform="translate(22,152)" opacity="0.8">
    <rect x="0"  y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)"/>
    <rect x="16" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)" opacity="0.75"/>
    <rect x="32" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)" opacity="0.50"/>
    <rect x="48" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)" opacity="0.30"/>
  </g>

  <!-- Bottom-right decorative strips //// -->
  <g transform="translate(860,152)" opacity="0.8">
    <rect x="58" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)"/>
    <rect x="42" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)" opacity="0.75"/>
    <rect x="26" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)" opacity="0.50"/>
    <rect x="10" y="0" width="9" height="26" rx="1" fill="#6D28D9" transform="skewX(-18)" opacity="0.30"/>
  </g>
